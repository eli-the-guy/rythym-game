<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MUGA FINAL BOSS 🔥</title>
    <style>
      body {
        margin: 0;
        background: #000;
        overflow: hidden;
        font-family: Arial;
        color: white;
      }
      #menu {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 5;
      }
      button {
        padding: 12px 20px;
        margin: 6px;
        border: none;
        border-radius: 12px;
        background: #111;
        color: white;
        cursor: pointer;
      }
      #hud {
        position: absolute;
        top: 15px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 25px;
        padding: 12px 25px;
        border-radius: 20px;
        background: rgba(20, 20, 40, 0.6);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(0, 255, 255, 0.3);
        box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        z-index: 3;
      }
      #combo {
        font-size: 36px;
        color: #0ff;
      }
      #perfectLine {
        position: absolute;
        bottom: 140px;
        width: 100%;
        height: 6px;
        background: #0ff;
      }
      canvas {
        position: absolute;
      }
    </style>
  </head>
  <body>
    <div id="menu">
      <h2>MUGA FINAL BOSS 🔥</h2>
      <button id="demoBtn">Play Demo</button>
      <button id="audioBtn">Load MP3</button><br />
      <label>Sensitivity: <span id="sensVal">1</span></label>
      <input type="range" min="0.5" max="2" step="0.1" value="1" id="sens" />
    </div>

    <div id="hud">
      <div>Score <span id="score">0</span></div>
      <div id="combo">0</div>
    </div>

    <div id="perfectLine"></div>
    <canvas id="c"></canvas>
    <audio id="music"></audio>

    <script>
      const c = document.getElementById("c"),
        ctx = c.getContext("2d");
      c.width = innerWidth;
      c.height = innerHeight;
      let notes = [],
        score = 0,
        combo = 0,
        startTime = 0,
        gameStarted = false;
      let laneW = c.width / 4,
        SPEED = 350;
      let sensitivity = 1;
      let holding = [false, false, false, false];

      // sensitivity
      sens.oninput = (e) => {
        sensitivity = parseFloat(e.target.value);
        sensVal.innerText = sensitivity;
      };

      // DEMO
      demoBtn.onclick = () => {
        notes = [];
        score = 0;
        combo = 0;
        startTime = performance.now() / 1000;
        for (let i = 0, t = 0; i < 80; i++) {
          notes.push({
            lane: i % 4,
            time: t,
            hit: false,
            hold: Math.random() < 0.3,
            duration: 0.5 + Math.random(),
          });
          t += 0.5 * sensitivity;
        }
        gameStarted = true;
        loop();
      };

      // MP3
      audioBtn.onclick = () => {
        let input = document.createElement("input");
        input.type = "file";
        input.accept = "audio/*";
        input.onchange = async (e) => {
          let file = e.target.files[0];
          music.src = URL.createObjectURL(file);
          await music.play();

          let ctx2 = new AudioContext();
          let decoded = await ctx2.decodeAudioData(await file.arrayBuffer());
          let data = decoded.getChannelData(0);

          notes = [];
          let last = 0;
          for (let i = 0; i < data.length; i += 2048) {
            let amp = Math.abs(data[i]);
            let t = i / decoded.sampleRate;
            if (amp > 0.05 && t - last > 0.25 * sensitivity) {
              notes.push({
                lane: Math.floor(Math.random() * 4),
                time: t,
                hit: false,
                hold: Math.random() < 0.3,
                duration: 0.5 + Math.random(),
              });
              last = t;
            }
          }
          startTime = performance.now() / 1000;
          gameStarted = true;
        };
        input.click();
      };

      // INPUT
      addEventListener("keydown", (e) => {
        let map = { q: 0, w: 1, e: 2, r: 3, u: 0, i: 1, o: 2, p: 3 };
        let k = e.key.toLowerCase();
        if (map[k] != null) {
          holding[map[k]] = true;
          hit(map[k]);
        }
      });
      addEventListener("keyup", (e) => {
        let map = { q: 0, w: 1, e: 2, r: 3, u: 0, i: 1, o: 2, p: 3 };
        let k = e.key.toLowerCase();
        if (map[k] != null) holding[map[k]] = false;
      });

      // TOUCH
      c.ontouchstart = (e) => {
        let x = e.touches[0].clientX;
        let l = Math.floor(x / laneW);
        holding[l] = true;
        hit(l);
      };
      c.ontouchend = () => (holding = [false, false, false, false]);

      // HIT
      function hit(l) {
        let t = performance.now() / 1000 - startTime;
        let best = null,
          bd = 999;
        notes.forEach((n) => {
          if (n.hit || n.lane != l) return;
          let d = Math.abs(n.time - t);
          if (d < bd) {
            bd = d;
            best = n;
          }
        });
        if (!best) {
          combo = 0;
          return;
        }
        best.hit = true;
        score += 100;
        combo++;
      }

      // DRAW
      function draw() {
        ctx.clearRect(0, 0, c.width, c.height);
        let t = performance.now() / 1000 - startTime;

        notes.forEach((n) => {
          let y = c.height - 140 - (n.time - t) * SPEED;

          if (n.hold) {
            let endY = c.height - 140 - (n.time + n.duration - t) * SPEED;
            ctx.fillStyle = "rgba(0,255,255,0.4)";
            ctx.fillRect(n.lane * laneW + 20, endY, laneW - 40, y - endY);
            ctx.fillStyle = "#0ff";
            ctx.fillRect(n.lane * laneW + 20, y, laneW - 50, 60);
          } else {
            if (n.hit) return;
            ctx.fillStyle = "#0ff";
            ctx.fillRect(n.lane * laneW + 20, y, laneW - 50, 60);
          }
        });

        // HOLD LOGIC
        notes.forEach((n) => {
          if (!n.hold || !n.hit) return;
          if (holding[n.lane]) {
            score += 1;
            combo++;
          } else {
            combo = 0;
            n.hit = true;
          }
        });

        score.innerText = score;
        comboEl.innerText = combo;
      }

      // LOOP
      function loop() {
        draw();
        requestAnimationFrame(loop);
      }
    </script>
  </body>
</html>
