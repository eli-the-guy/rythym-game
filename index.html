<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MUGA FINAL BOSS</title>

    <style>
      body {
        margin: 0;
        background: #000;
        overflow: hidden;
        font-family: Arial;
        color: white;
      }
      #menu {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 5;
      }
      button {
        padding: 12px;
        margin: 6px;
        border-radius: 10px;
        border: none;
      }
      #hud {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 20px;
        padding: 10px 20px;
        border-radius: 15px;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(10px);
      }
      #perfectLine {
        position: absolute;
        bottom: 140px;
        width: 100%;
        height: 12px;
        background: #0ff;
        opacity: 0.5;
      }
      canvas {
        position: absolute;
      }
      #bgVideo {
        position: fixed;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -2;
        filter: brightness(0.3);
        display: none;
      }
    </style>
  </head>

  <body>
    <div id="menu">
      <h2>MUGA FINAL BOSS 🔥</h2>
      <button id="demoBtn">Play Demo</button>
      <button id="audioBtn">Load MP3</button>
      <button id="videoBtn">Load Video</button>
    </div>

    <div id="hud">
      <div>Score: <span id="score">0</span></div>
      <div>Combo: <span id="combo">0</span></div>
    </div>

    <div id="perfectLine"></div>

    <video id="bgVideo" autoplay loop muted playsinline></video>
    <canvas id="c"></canvas>
    <audio id="music" playsinline></audio>

    <script>
      const c = document.getElementById("c"),
        ctx = c.getContext("2d");
      c.width = innerWidth;
      c.height = innerHeight;

      let notes = [],
        particles = [];
      let score = 0,
        combo = 0,
        startTime = 0,
        gameStarted = false,
        songDuration = 0;

      const laneW = innerWidth / 4,
        SPEED = 500;

      // 🔊 AUDIO UNLOCK
      let unlocked = false;
      function unlockAudio() {
        if (unlocked) return;
        let ctx2 = new (window.AudioContext || window.webkitAudioContext)();
        ctx2.resume();
        unlocked = true;
      }
      addEventListener("touchstart", unlockAudio, { once: true });
      addEventListener("click", unlockAudio, { once: true });

      // 🎵 DEMO SONG
      document.getElementById("demoBtn").onclick = () => {
        document.getElementById("menu").style.display = "none";

        notes = [];
        score = 0;
        combo = 0;

        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let gain = audioCtx.createGain();
        gain.connect(audioCtx.destination);

        let t = 0;
        for (let i = 0; i < 100; i++) {
          notes.push({ lane: i % 4, time: t, hit: false });

          let osc = audioCtx.createOscillator();
          osc.frequency.value = 200 + Math.random() * 300;
          osc.connect(gain);
          osc.start(audioCtx.currentTime + t);
          osc.stop(audioCtx.currentTime + t + 0.05);

          t += 0.6;
        }

        songDuration = t;
        startTime = performance.now() / 1000;
        gameStarted = true;
        loop();
      };

      // 🎥 VIDEO
      const bgVideo = document.getElementById("bgVideo");
      document.getElementById("videoBtn").onclick = () => {
        let input = document.createElement("input");
        input.type = "file";
        input.accept = "video/*";
        input.onchange = (e) => {
          bgVideo.src = URL.createObjectURL(e.target.files[0]);
          bgVideo.style.display = "block";
          bgVideo.play();
        };
        input.click();
      };

      // 🎨 PARTICLES
      function spawnParticles(x, y) {
        for (let i = 0; i < 10; i++) {
          particles.push({
            x,
            y,
            vx: (Math.random() - 0.5) * 5,
            vy: (Math.random() - 0.5) * 5,
            life: 1,
          });
        }
      }

      // 🎮 HIT
      function hit(l) {
        let time = performance.now() / 1000 - startTime;
        let best = null,
          bd = 999;

        notes.forEach((n) => {
          if (n.hit || n.lane !== l) return;
          let d = Math.abs(n.time - time);
          if (d < bd) {
            bd = d;
            best = n;
          }
        });

        if (!best) {
          combo = 0;
          return;
        }

        if (bd < 0.12) {
          score += 300;
          combo++;
          spawnParticles(l * laneW + laneW / 2, innerHeight - 140);
        } else if (bd < 0.2) {
          score += 150;
          combo++;
        } else {
          combo = 0;
        }

        best.hit = true;
        document.getElementById("score").innerText = score;
        document.getElementById("combo").innerText = combo;
      }

      // 📱 TOUCH (FULL SCREEN)
      c.addEventListener(
        "touchstart",
        (e) => {
          let x = e.touches[0].clientX;
          let lane = Math.floor(x / (innerWidth / 4));
          hit(lane);
        },
        { passive: false },
      );

      // ⌨️ KEYS
      addEventListener("keydown", (e) => {
        let map = { a: 0, s: 1, d: 2, f: 3 };
        if (map[e.key] != null) hit(map[e.key]);
      });

      // 🎨 DRAW
      function draw() {
        ctx.clearRect(0, 0, c.width, c.height);

        // 🌌 BACKGROUND
        let t = performance.now() * 0.002;
        ctx.fillStyle = `hsl(${(t * 40) % 360},50%,8%)`;
        ctx.fillRect(0, 0, c.width, c.height);

        // lanes
        for (let i = 0; i < 4; i++) {
          ctx.fillStyle = "rgba(0,200,255,0.1)";
          ctx.fillRect(i * laneW, 0, laneW, c.height);

          // hit zone
          ctx.fillStyle = "rgba(0,255,255,0.2)";
          ctx.fillRect(i * laneW, c.height - 140, laneW, 120);
        }

        // notes
        let time = performance.now() / 1000 - startTime;
        notes.forEach((n) => {
          if (n.hit) return;
          let y = c.height - 140 - (n.time - time) * SPEED;
          ctx.fillStyle = `hsl(${n.lane * 90},100%,60%)`;
          ctx.fillRect(n.lane * laneW + 20, y, laneW - 40, 50);
        });

        // particles
        particles.forEach((p) => {
          ctx.fillStyle = "#0ff";
          ctx.fillRect(p.x, p.y, 4, 4);
          p.x += p.vx;
          p.y += p.vy;
          p.life -= 0.02;
        });
        particles = particles.filter((p) => p.life > 0);
      }

      // LOOP
      function update() {
        let time = performance.now() / 1000 - startTime;
        if (time > songDuration) gameStarted = false;
      }

      function loop() {
        draw();
        if (gameStarted) update();
        requestAnimationFrame(loop);
      }
    </script>
  </body>
</html>
