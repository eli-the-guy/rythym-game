<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>ONLINE Rhythm Game</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        touch-action: none;
        background: black;
        font-family: Arial;
        color: white;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #menu {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
      }
      button {
        padding: 12px 20px;
        margin: 6px;
        font-size: 16px;
      }
      #ui {
        position: absolute;
        top: 10px;
        left: 10px;
      }
      #combo {
        font-size: 24px;
        color: #0ff;
      }
      .touchBtn {
        position: absolute;
        bottom: 0;
        width: 24%;
        height: 35vh;
        background: rgba(0, 255, 255, 0.2);
        border: 1px solid #0ff;
      }
      #tapOverlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        color: white;
        font-size: 28px;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        cursor: pointer;
        z-index: 1000;
      }
    </style>
  </head>
  <body>
    <div id="menu">
      <h2>ONLINE MODE</h2>
      <button id="fileBtn">📁 Upload Song</button><br />
      <input
        id="urlInput"
        placeholder="Paste direct audio or Google Drive link"
        style="width: 260px; padding: 8px"
      /><br />
      <button onclick="loadURL()">🌐 Load URL</button><br />
      <button id="easyBtn">🎵 Easy Mode</button><br /><br />

      <label for="sensitivitySlider">Beat Sensitivity:</label><br />
      <input
        type="range"
        id="sensitivitySlider"
        min="0.05"
        max="0.5"
        step="0.01"
        value="0.15"
        style="width: 200px"
      /><br />
      <span id="sensitivityValue">0.15</span>
    </div>

    <div id="tapOverlay">Tap to Start Music</div>

    <div id="ui">
      Score: <span id="score">0</span><br />
      <div id="combo">Combo: 0</div>
    </div>

    <div class="touchBtn" style="left: 0" data-lane="0"></div>
    <div class="touchBtn" style="left: 25%" data-lane="1"></div>
    <div class="touchBtn" style="left: 50%" data-lane="2"></div>
    <div class="touchBtn" style="left: 75%" data-lane="3"></div>

    <canvas id="c"></canvas>
    <audio id="music" playsinline controls crossorigin="anonymous"></audio>

    <script>
      const c = document.getElementById("c"),
        ctx = c.getContext("2d");
      c.width = innerWidth;
      c.height = innerHeight;
      const music = document.getElementById("music");
      const menu = document.getElementById("menu");
      const tapOverlay = document.getElementById("tapOverlay");

      let audioCtx;
      let notes = [],
        score = 0,
        combo = 0;
      const laneW = c.width / 4;

      // Keyboard mappings: WASD, QWER, UIOP
      const keyToLane = {
        A: 0,
        W: 1,
        S: 2,
        D: 3,
        Q: 0,
        W: 1,
        E: 2,
        R: 3,
        U: 0,
        I: 1,
        O: 2,
        P: 3,
      };

      // Timing and speed
      let NOTE_SPEED = 500;
      let PERFECT = 0.12;
      let GOOD = 0.25;

      const EASY_SPEED = 300;
      const EASY_PERFECT = 0.18;
      const EASY_GOOD = 0.35;

      // Easy Mode button
      document.getElementById("easyBtn").onclick = () => {
        NOTE_SPEED = EASY_SPEED;
        PERFECT = EASY_PERFECT;
        GOOD = EASY_GOOD;
        alert("Easy Mode Activated! Notes are slower and more forgiving.");
      };

      // Sensitivity slider display
      const slider = document.getElementById("sensitivitySlider");
      const sliderValue = document.getElementById("sensitivityValue");
      slider.addEventListener("input", () => {
        sliderValue.innerText = slider.value;
      });

      // Unlock audio context function
      async function unlock() {
        if (!audioCtx)
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === "suspended") await audioCtx.resume();
      }

      // Show overlay and wait for tap to start music
      function showTapOverlay() {
        tapOverlay.style.display = "flex";
        tapOverlay.onclick = async () => {
          await unlock();
          tapOverlay.style.display = "none";
          music.play().catch(() => {});
        };
      }

      // Analyze audio buffer to generate beats
      async function analyze(buffer) {
        const threshold = parseFloat(
          document.getElementById("sensitivitySlider").value,
        );
        const audio = await audioCtx.decodeAudioData(buffer.slice(0));
        const data = audio.getChannelData(0);
        const sr = audio.sampleRate;
        let beats = [],
          size = 2048;

        for (let i = 0; i < data.length; i += size) {
          let sum = 0;
          for (let j = 0; j < size; j++) {
            let v = data[i + j] || 0;
            sum += v * v;
          }
          if (Math.sqrt(sum / size) > threshold) beats.push(i / sr);
        }

        let out = [],
          last = 0;
        beats.forEach((t) => {
          if (t - last > 0.15) {
            out.push(t);
            last = t;
          }
        });
        return out;
      }

      function spawn(b) {
        notes = b.map((t) => ({
          lane: Math.floor(Math.random() * 4),
          time: t,
          hit: false,
        }));
      }

      function draw() {
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.fillRect(0, 0, c.width, c.height);
        for (let i = 0; i < 4; i++) {
          ctx.fillStyle = "rgba(80,80,150,0.3)";
          ctx.fillRect(i * laneW, 0, laneW, c.height);
        }
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, c.height - 120, c.width, 5);
        notes.forEach((n) => {
          if (n.hit) return;
          let y = c.height - 120 - (n.time - music.currentTime) * NOTE_SPEED;
          ctx.fillStyle = `hsl(${n.lane * 90},100%,60%)`;
          ctx.fillRect(n.lane * laneW + 20, y, laneW - 40, 20);
        });
      }

      function update() {
        notes.forEach((n) => {
          if (
            !n.hit &&
            c.height - 120 - (n.time - music.currentTime) * NOTE_SPEED >
              c.height
          ) {
            n.hit = true;
            combo = 0;
          }
        });
      }

      function hit(l) {
        let best = null,
          bd = 999;
        notes.forEach((n) => {
          if (n.hit || n.lane !== l) return;
          let d = Math.abs(n.time - music.currentTime);
          if (d < bd) {
            bd = d;
            best = n;
          }
        });
        if (!best) return;

        if (bd <= PERFECT) {
          combo++;
          score += 100 * combo;
          best.hit = true;
        } else if (bd <= GOOD) {
          combo++;
          score += 70 * combo;
          best.hit = true;
        } else {
          combo = 0;
        }

        document.getElementById("score").innerText = score;
        document.getElementById("combo").innerText = "Combo: " + combo;
      }

      function loop() {
        draw();
        update();
        requestAnimationFrame(loop);
      }

      // Keyboard controls
      addEventListener("keydown", (e) => {
        const l = keyToLane[e.key.toUpperCase()];
        if (l !== undefined) hit(l);
      });

      // Touch controls
      document.querySelectorAll(".touchBtn").forEach((btn) => {
        btn.addEventListener(
          "touchstart",
          (e) => {
            e.preventDefault();
            hit(parseInt(btn.dataset.lane));
          },
          { passive: false },
        );
      });

      // File upload
      document.getElementById("fileBtn").onclick = async () => {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "audio/mpeg,audio/wav,audio/mp4,audio/*";
        input.onchange = async (e) => {
          const file = e.target.files[0];
          if (!file) return alert("No file selected");

          const url = URL.createObjectURL(file);
          music.src = url;

          const buf = await file.arrayBuffer();
          const beats = await analyze(buf);
          spawn(beats);

          menu.style.display = "none";
          loop();
          showTapOverlay();
        };
        input.click();
      };

      // URL Load with Google Drive support
      async function loadURL() {
        try {
          let url = document.getElementById("urlInput").value.trim();
          if (!url) return alert("Paste a valid audio URL");

          const driveMatch = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
          if (driveMatch) {
            const fileId = driveMatch[1];
            url = `https://drive.google.com/uc?export=download&id=${fileId}`;
          }

          const res = await fetch(url, { mode: "cors" });
          if (!res.ok) throw new Error("Fetch failed");

          const buf = await res.arrayBuffer();
          const beats = await analyze(buf);
          spawn(beats);

          music.src = url;
          menu.style.display = "none";
          loop();
          showTapOverlay();
        } catch (err) {
          alert(
            "URL failed. Use direct .mp3/.wav link, Google Drive link, or upload file.",
          );
          console.error(err);
        }
      }
    </script>
  </body>
</html>
