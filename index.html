<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FINAL BOSS Rhythm Game</title>

    <style>
      body {
        margin: 0;
        background: black;
        color: white;
        font-family: Arial;
        overflow: hidden;
      }
      canvas {
        display: block;
      }

      #menu {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 20;
      }

      #ui {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 15;
      }

      .touchBtn {
        position: absolute;
        bottom: 0;
        width: 25%;
        height: 35vh;
        background: rgba(0, 255, 255, 0.2);
        border: 1px solid #0ff;
        z-index: 5;
      }

      #overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 40px;
        background: rgba(0, 0, 0, 0.9);
        opacity: 0;
        pointer-events: none;
        transition: 0.3s;
        z-index: 50;
      }

      #hitText {
        position: absolute;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 40px;
        opacity: 0;
        z-index: 30;
        transition: 0.2s;
      }
    </style>
  </head>

  <body>
    <div id="menu">
      <h2>FINAL BOSS MODE</h2>
      <button id="fileBtn">Upload Song</button><br />
      <input id="urlInput" placeholder="Audio / Drive link" /><br />
      <button onclick="loadURL()">Load URL</button><br />
      <button id="easyBtn">Easy Mode</button><br />

      <label>Sensitivity</label><br />
      <input
        type="range"
        id="sens"
        min="0.05"
        max="0.5"
        step="0.01"
        value="0.15"
      /><br />
      <span id="sensVal">0.15</span>
    </div>

    <div id="overlay"></div>
    <div id="hitText"></div>

    <div id="ui">
      Score: <span id="score">0</span><br />
      Combo: <span id="combo">0</span><br />
      Accuracy: <span id="acc">100%</span><br />
      P:<span id="p">0</span> G:<span id="g">0</span> M:<span id="m">0</span>
    </div>

    <div class="touchBtn" style="left: 0" data-lane="0"></div>
    <div class="touchBtn" style="left: 25%" data-lane="1"></div>
    <div class="touchBtn" style="left: 50%" data-lane="2"></div>
    <div class="touchBtn" style="left: 75%" data-lane="3"></div>

    <canvas id="c"></canvas>
    <audio id="music" playsinline></audio>

    <script>
      const c = document.getElementById("c"),
        ctx = c.getContext("2d");
      c.width = innerWidth;
      c.height = innerHeight;

      const music = document.getElementById("music");
      const overlay = document.getElementById("overlay");
      const hitText = document.getElementById("hitText");

      let audioCtx;
      let notes = [],
        particles = [];
      let score = 0,
        combo = 0;
      let pC = 0,
        gC = 0,
        mC = 0;
      let laneGlow = [0, 0, 0, 0];

      const laneW = c.width / 4;
      let SPEED = 500,
        PERF = 0.12,
        GOOD = 0.25;

      const keys = {
        A: 0,
        W: 1,
        S: 2,
        D: 3,
        Q: 0,
        W: 1,
        E: 2,
        R: 3,
        U: 0,
        I: 1,
        O: 2,
        P: 3,
      };

      document.getElementById("sens").oninput = (e) => {
        sensVal.innerText = e.target.value;
      };

      document.getElementById("easyBtn").onclick = () => {
        SPEED = 300;
        PERF = 0.18;
        GOOD = 0.35;
      };

      async function unlock() {
        if (!audioCtx)
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === "suspended") await audioCtx.resume();
      }

      function showOverlay(t) {
        overlay.innerText = t;
        overlay.style.opacity = 1;
        overlay.style.pointerEvents = "auto";
      }

      function hideOverlay() {
        overlay.style.opacity = 0;
        overlay.style.pointerEvents = "none";
      }

      async function countdown() {
        for (let t of ["Ready", "3", "2", "1", "GO"]) {
          showOverlay(t);
          await new Promise((r) => setTimeout(r, 600));
        }
        hideOverlay();
      }

      function showHit(t, c) {
        hitText.innerText = t;
        hitText.style.color = c;
        hitText.style.opacity = 1;
        setTimeout(() => (hitText.style.opacity = 0), 200);
      }

      function spawnParticles(x, y, col) {
        for (let i = 0; i < 10; i++) {
          particles.push({
            x,
            y,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6,
            life: 20,
            color: col,
          });
        }
      }

      function updateAcc() {
        let tot = pC + gC + mC;
        if (!tot) return;
        let acc = ((pC + gC * 0.7) / tot) * 100;
        document.getElementById("acc").innerText = acc.toFixed(1) + "%";
      }

      async function analyze(buf) {
        const th = parseFloat(sens.value);
        const a = await audioCtx.decodeAudioData(buf.slice(0));
        const d = a.getChannelData(0);
        let beats = [],
          sr = a.sampleRate;

        for (let i = 0; i < d.length; i += 2048) {
          let sum = 0;
          for (let j = 0; j < 2048; j++) {
            let v = d[i + j] || 0;
            sum += v * v;
          }
          if (Math.sqrt(sum / 2048) > th) beats.push(i / sr);
        }

        let out = [],
          last = 0;
        beats.forEach((t) => {
          if (t - last > 0.15) {
            out.push(t);
            last = t;
          }
        });
        return out;
      }

      function spawn(b) {
        notes = b.map((t) => ({
          lane: Math.floor(Math.random() * 4),
          time: t,
          hit: false,
        }));
      }

      function draw() {
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.fillRect(0, 0, c.width, c.height);

        for (let i = 0; i < 4; i++) {
          ctx.fillStyle = laneGlow[i]
            ? "rgba(0,255,255,0.4)"
            : "rgba(80,80,150,0.3)";
          ctx.fillRect(i * laneW, 0, laneW, c.height);
        }

        ctx.fillStyle = "#fff";
        ctx.fillRect(0, c.height - 120, c.width, 5);

        notes.forEach((n) => {
          if (n.hit) return;
          let y = c.height - 120 - (n.time - music.currentTime) * SPEED;
          ctx.fillStyle = `hsl(${n.lane * 90},100%,60%)`;
          ctx.fillRect(n.lane * laneW + 20, y, laneW - 40, 20);
        });

        particles.forEach((p) => {
          ctx.fillStyle = p.color;
          ctx.fillRect(p.x, p.y, 4, 4);
          p.x += p.vx;
          p.y += p.vy;
          p.life--;
        });
        particles = particles.filter((p) => p.life > 0);
      }

      function update() {
        notes.forEach((n) => {
          if (
            !n.hit &&
            c.height - 120 - (n.time - music.currentTime) * SPEED > c.height
          ) {
            n.hit = true;
            combo = 0;
            mC++;
            updateAcc();
          }
        });
      }

      function hit(l) {
        laneGlow[l] = 1;
        setTimeout(() => (laneGlow[l] = 0), 100);

        let best = null,
          bd = 999;

        notes.forEach((n) => {
          if (n.hit || n.lane !== l) return;
          let d = Math.abs(n.time - music.currentTime);
          if (d < bd) {
            bd = d;
            best = n;
          }
        });

        if (!best) {
          combo = 0;
          mC++;
          showHit("MISS", "red");
          updateAcc();
          return;
        }

        let x = l * laneW + laneW / 2,
          y = c.height - 120;

        if (bd <= PERF) {
          combo++;
          score += 100 * combo;
          pC++;
          best.hit = true;
          showHit("PERFECT", "#0ff");
          spawnParticles(x, y, "#0ff");
        } else if (bd <= GOOD) {
          combo++;
          score += 70 * combo;
          gC++;
          best.hit = true;
          showHit("GOOD", "#0f8");
          spawnParticles(x, y, "#0f8");
        } else {
          combo = 0;
          mC++;
          showHit("MISS", "red");
        }

        updateAcc();

        scoreEl.innerText = score;
        comboEl.innerText = combo;
        p.innerText = pC;
        g.innerText = gC;
        m.innerText = mC;
      }

      function loop() {
        draw();
        update();
        requestAnimationFrame(loop);
      }

      addEventListener("keydown", (e) => {
        let l = keys[e.key.toUpperCase()];
        if (l != null) hit(l);
      });

      document.querySelectorAll(".touchBtn").forEach((b) => {
        b.addEventListener(
          "touchstart",
          (e) => {
            e.preventDefault();
            hit(parseInt(b.dataset.lane));
          },
          { passive: false },
        );
      });

      async function start(buf, src) {
        await unlock();
        spawn(await analyze(buf));
        music.src = src;

        menu.style.display = "none";
        loop();

        let p = music.play();

        if (p) {
          p.then(async () => await countdown()).catch(() => {
            showOverlay("Tap to Start");
            overlay.onclick = async () => {
              await music.play();
              await countdown();
            };
          });
        }
      }

      fileBtn.onclick = () => {
        let i = document.createElement("input");
        i.type = "file";
        i.accept = "audio/*";
        i.onchange = async (e) => {
          let f = e.target.files[0];
          start(await f.arrayBuffer(), URL.createObjectURL(f));
        };
        i.click();
      };

      async function loadURL() {
        try {
          let u = urlInput.value.trim();
          let m = u.match(/\/d\/([a-zA-Z0-9_-]+)/);
          if (m) u = `https://drive.google.com/uc?export=download&id=${m[1]}`;

          let r = await fetch(u);
          start(await r.arrayBuffer(), u);
        } catch {
          alert("URL failed");
        }
      }
    </script>
  </body>
</html>
