<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MUGA ULTRA</title>

    <style>
      body {
        margin: 0;
        background: #000;
        overflow: hidden;
        font-family: Arial;
        color: white;
      }

      #menu {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 5;
      }

      button {
        padding: 12px 20px;
        margin: 6px;
        border: none;
        border-radius: 12px;
        background: #111;
        color: white;
      }

      #hud {
        position: absolute;
        top: 15px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 25px;
        padding: 12px 25px;
        border-radius: 20px;
        background: rgba(20, 20, 40, 0.6);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(0, 255, 255, 0.3);
        box-shadow:
          0 0 20px rgba(0, 255, 255, 0.2),
          inset 0 0 10px rgba(0, 255, 255, 0.15);
        z-index: 3;
      }

      #combo {
        font-size: 36px;
        color: #0ff;
      }
      #rank {
        font-size: 26px;
        color: #ff0;
      }
      #acc {
        font-size: 26px;
        color: #0f0;
      }

      #perfectLine {
        position: absolute;
        bottom: 140px;
        width: 100%;
        height: 10px;
        background: #0ff;
        opacity: 0.6;
        border-radius: 6px;
      }

      #endScreen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-size: 28px;
        z-index: 10;
        opacity: 0;
        pointer-events: none;
        transition: 0.3s;
      }

      #bgVideo {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -2;
        filter: brightness(0.3);
        display: none;
      }

      canvas {
        position: absolute;
        z-index: 1;
      }
    </style>
  </head>

  <body>
    <div id="menu">
      <h2>MUGA ULTRA 🔥</h2>
      <button id="demoBtn">Play Demo</button>
      <button id="audioBtn">Load MP3</button>
      <button id="videoBtn">Load Video</button>

      <div>
        <label>Sensitivity: <span id="sensVal">1</span></label>
        <input type="range" min="0.5" max="2" step="0.1" value="1" id="sens" />
      </div>
    </div>

    <div id="hud">
      <div>Score <span id="score">0</span></div>
      <div id="combo">0</div>
      <div>Rank <span id="rank">D</span></div>
      <div>Acc <span id="acc">100%</span></div>
    </div>

    <div id="perfectLine"></div>

    <div id="endScreen">
      <h1>RESULTS</h1>
      <div id="finalScore"></div>
      <div id="finalAcc"></div>
      <div id="finalRank"></div>
      <button onclick="location.reload()">Restart</button>
    </div>

    <video id="bgVideo" autoplay loop muted playsinline></video>
    <canvas id="c"></canvas>
    <audio id="music" playsinline></audio>

    <script>
      const c = document.getElementById("c"),
        ctx = c.getContext("2d");
      c.width = innerWidth;
      c.height = innerHeight;

      const music = document.getElementById("music");
      const bgVideo = document.getElementById("bgVideo");

      let notes = [],
        particles = [];
      let score = 0,
        combo = 0,
        hits = 0,
        total = 0;
      let startTime = 0,
        gameStarted = false,
        songDuration = 0;

      let screenShake = 0,
        comboGlow = 0;

      const laneW = innerWidth / 4,
        SPEED = 500;

      let sensitivity = 1;
      const sensSlider = document.getElementById("sens");
      sensSlider.oninput = () => {
        sensitivity = parseFloat(sensSlider.value);
        document.getElementById("sensVal").innerText = sensitivity;
      };

      // MOBILE AUDIO UNLOCK
      let unlocked = false;
      function unlockAudio() {
        if (unlocked) return;
        let ctx2 = new (window.AudioContext || window.webkitAudioContext)();
        ctx2.resume();
        unlocked = true;
      }
      addEventListener("touchstart", unlockAudio, { once: true });
      addEventListener("click", unlockAudio, { once: true });

      // DEMO
      document.getElementById("demoBtn").onclick = () => {
        menu.style.display = "none";
        notes = [];
        score = 0;
        combo = 0;
        hits = 0;

        let t = 0;
        for (let i = 0; i < 100; i++) {
          notes.push({ lane: i % 4, time: t, hit: false });
          t += 0.6 * sensitivity;
        }

        total = notes.length;
        songDuration = t;
        startTime = performance.now() / 1000;
        gameStarted = true;
        loop();
      };

      // MP3
      document.getElementById("audioBtn").onclick = () => {
        let input = document.createElement("input");
        input.type = "file";
        input.accept = "audio/*";

        input.onchange = async (e) => {
          let file = e.target.files[0];
          music.src = URL.createObjectURL(file);
          await music.play().catch(() => alert("Tap screen"));

          let ctx2 = new AudioContext();
          let decoded = await ctx2.decodeAudioData(await file.arrayBuffer());

          notes = [];
          score = 0;
          combo = 0;
          hits = 0;

          let data = decoded.getChannelData(0);
          let sr = decoded.sampleRate,
            last = 0;

          for (let i = 0; i < data.length; i += 1024) {
            let amp = 0;
            for (let j = 0; j < 1024; j++) amp += Math.abs(data[i + j] || 0);
            amp /= 1024;

            let t = i / sr;
            if (amp > 0.12 && t - last > 0.3 * sensitivity) {
              notes.push({
                lane: (Math.random() * 4) | 0,
                time: t,
                hit: false,
              });
              last = t;
            }
          }

          total = notes.length;
          songDuration = decoded.duration;
          startTime = performance.now() / 1000;
          gameStarted = true;
          loop();
        };

        input.click();
      };

      // VIDEO
      document.getElementById("videoBtn").onclick = () => {
        let input = document.createElement("input");
        input.type = "file";
        input.accept = "video/*";
        input.onchange = (e) => {
          bgVideo.src = URL.createObjectURL(e.target.files[0]);
          bgVideo.style.display = "block";
          bgVideo.play();
        };
        input.click();
      };

      // HIT
      function hit(l) {
        let time = performance.now() / 1000 - startTime;
        let best = null,
          bd = 999;

        notes.forEach((n) => {
          if (n.hit || n.lane !== l) return;
          let d = Math.abs(n.time - time);
          if (d < bd) {
            bd = d;
            best = n;
          }
        });

        if (!best) {
          combo = 0;
          comboGlow = 0;
          return;
        }

        if (bd < 0.12 * sensitivity) {
          score += 300;
          hits++;
          combo++;
          spawnParticles(l, 15);
          comboGlow = Math.min(comboGlow + 0.2, 1);
          screenShake = 8;
        } else if (bd < 0.2 * sensitivity) {
          score += 150;
          hits++;
          combo++;
          spawnParticles(l, 8);
          comboGlow = Math.min(comboGlow + 0.1, 1);
          screenShake = 4;
        } else {
          combo = 0;
          comboGlow = 0;
        }

        best.hit = true;

        scoreEl.textContent = score;
        comboEl.textContent = combo;

        updateRank();
      }

      // PARTICLES
      function spawnParticles(l, a = 8) {
        for (let i = 0; i < a; i++) {
          particles.push({
            x: l * laneW + laneW / 2,
            y: c.height - 140,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 1) * 6,
            life: 1,
          });
        }
      }

      // TOUCH
      c.addEventListener(
        "touchstart",
        (e) => {
          let x = e.touches[0].clientX;
          hit(Math.floor(x / laneW));
        },
        { passive: false },
      );

      // KEYS
      addEventListener("keydown", (e) => {
        let map = { a: 0, s: 1, d: 2, f: 3 };
        if (map[e.key] != null) hit(map[e.key]);
      });

      // DRAW
      function draw() {
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, c.width, c.height);

        let shakeX = (Math.random() - 0.5) * screenShake;
        let shakeY = (Math.random() - 0.5) * screenShake;
        ctx.translate(shakeX, shakeY);

        screenShake *= 0.9;
        comboGlow *= 0.95;

        if (bgVideo.style.display !== "block") {
          let t = performance.now() * 0.002;
          ctx.fillStyle = `hsl(${(t * 40) % 360},50%,8%)`;
          ctx.fillRect(0, 0, c.width, c.height);
        }

        for (let i = 0; i < 4; i++) {
          let g = comboGlow;

          ctx.fillStyle = `rgba(0,200,255,${0.08 + g * 0.15})`;
          ctx.fillRect(i * laneW, 0, laneW, c.height);

          ctx.strokeStyle = `rgba(0,255,255,${0.2 + g * 0.6})`;
          ctx.lineWidth = 2 + g * 4;
          ctx.strokeRect(i * laneW, 0, laneW, c.height);

          ctx.fillStyle = "rgba(0,255,255,0.25)";
          ctx.fillRect(i * laneW, c.height - 140, laneW, 120);
        }

        let time = performance.now() / 1000 - startTime;
        notes.forEach((n) => {
          if (n.hit) return;
          let y = c.height - 140 - (n.time - time) * SPEED;
          ctx.fillStyle = `hsl(${n.lane * 90},100%,60%)`;
          ctx.fillRect(n.lane * laneW + 20, y, laneW - 40, 50);
        });

        particles.forEach((p) => {
          ctx.fillStyle = "#0ff";
          ctx.fillRect(p.x, p.y, 4, 4);
          p.x += p.vx;
          p.y += p.vy;
          p.life -= 0.02;
        });
        particles = particles.filter((p) => p.life > 0);
      }

      // UPDATE
      function update() {
        let time = performance.now() / 1000 - startTime;

        notes.forEach((n) => {
          if (!n.hit && time - n.time > 0.4) {
            combo = 0;
            n.hit = true;
          }
        });

        if (time > songDuration + 1) showEnd();
      }

      // RANK
      function updateRank() {
        let acc = hits / Math.max(1, total);
        accEl.textContent = Math.round(acc * 100) + "%";

        let r = "D";
        if (acc > 0.95) r = "S";
        else if (acc > 0.85) r = "A";
        else if (acc > 0.7) r = "B";
        else if (acc > 0.5) r = "C";

        rankEl.textContent = r;
      }

      // END
      function showEnd() {
        gameStarted = false;

        let acc = hits / Math.max(1, total);

        finalScore.textContent = "Score: " + score;
        finalAcc.textContent = "Accuracy: " + Math.round(acc * 100) + "%";
        finalRank.textContent = "Rank: " + rankEl.textContent;

        endScreen.style.opacity = 1;
        endScreen.style.pointerEvents = "auto";
      }

      // LOOP
      function loop() {
        draw();
        if (gameStarted) update();
        requestAnimationFrame(loop);
      }
    </script>
  </body>
</html>
