<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MUGA RHYTHM</title>

    <style>
      body {
        margin: 0;
        background: #000;
        color: white;
        font-family: Arial;
        overflow: hidden;
      }

      #menu {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 5;
      }

      button {
        padding: 12px 20px;
        margin: 6px;
        border: none;
        border-radius: 10px;
      }

      #hud {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 30px;
        padding: 15px 25px;
        border-radius: 20px;
        background: rgba(20, 20, 40, 0.6);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(0, 255, 255, 0.3);
        box-shadow:
          0 0 20px rgba(0, 255, 255, 0.2),
          inset 0 0 10px rgba(0, 255, 255, 0.15);
        z-index: 3;
      }

      #combo {
        font-size: 40px;
        color: #0ff;
      }
      #rank {
        font-size: 30px;
        color: #ff0;
      }

      .touchBtn {
        position: absolute;
        bottom: 0;
        width: 25%;
        height: 35vh;
        background: rgba(0, 255, 255, 0.1);
      }

      #bgVideo {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -2;
        filter: brightness(0.3);
        display: none;
      }

      #endScreen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-size: 30px;
        z-index: 10;
        opacity: 0;
        pointer-events: none;
        transition: 0.4s;
      }
    </style>
  </head>

  <body>
    <div id="menu">
      <h2>MUGA MODE 🔥</h2>
      <button id="demoBtn">▶ Play Original Song</button>
      <button id="audioBtn">🎵 Load MP3</button>
    </div>

    <div id="hud">
      <div>Score <span id="score">0</span></div>
      <div id="combo">0</div>
      <div>Rank <span id="rank">D</span></div>
      <div>Acc <span id="acc">100%</span></div>
    </div>

    <div id="endScreen">
      <h1>RESULTS</h1>
      <div id="finalScore"></div>
      <div id="finalAcc"></div>
      <div id="finalRank"></div>
      <button onclick="location.reload()">RESTART</button>
    </div>

    <div class="touchBtn" style="left: 0" data-lane="0"></div>
    <div class="touchBtn" style="left: 25%" data-lane="1"></div>
    <div class="touchBtn" style="left: 50%" data-lane="2"></div>
    <div class="touchBtn" style="left: 75%" data-lane="3"></div>

    <canvas id="c"></canvas>

    <script>
      const c = document.getElementById("c"),
        ctx = c.getContext("2d");
      c.width = innerWidth;
      c.height = innerHeight;

      let notes = [],
        score = 0,
        combo = 0,
        hits = 0,
        total = 0;
      let startTime = 0,
        gameStarted = false,
        songDuration = 0;

      const laneW = innerWidth / 4,
        SPEED = 500;

      const scoreEl = document.getElementById("score");
      const comboEl = document.getElementById("combo");
      const rankEl = document.getElementById("rank");
      const accEl = document.getElementById("acc");

      const endScreen = document.getElementById("endScreen");

      // 🎵 ORIGINAL SONG
      document.getElementById("demoBtn").onclick = () => startSong();

      // 🎵 MP3
      document.getElementById("audioBtn").onclick = () => {
        let input = document.createElement("input");
        input.type = "file";
        input.accept = "audio/*";

        input.onchange = async (e) => {
          let file = e.target.files[0];
          if (!file) return;

          let ctxA = new AudioContext();
          let buf = await file.arrayBuffer();
          let decoded = await ctxA.decodeAudioData(buf);

          notes = [];
          score = 0;
          combo = 0;
          hits = 0;

          let data = decoded.getChannelData(0);
          let sr = decoded.sampleRate;
          let last = 0;

          for (let i = 0; i < data.length; i += 2048) {
            let sum = 0;
            for (let j = 0; j < 2048; j++) sum += Math.abs(data[i + j] || 0);
            let amp = sum / 2048;

            if (amp > 0.25) {
              let t = i / sr;
              if (t - last > 0.2) {
                notes.push({
                  lane: Math.floor(Math.random() * 4),
                  time: t,
                  hit: false,
                });
                last = t;
              }
            }
          }

          total = notes.length;
          songDuration = decoded.duration;

          let audio = new Audio(URL.createObjectURL(file));
          audio.play();

          startTime = performance.now() / 1000;
          gameStarted = true;
          loop();
        };
        input.click();
      };

      // DEMO SONG
      function startSong() {
        notes = [];
        score = 0;
        combo = 0;
        hits = 0;

        let t = 0;
        for (let i = 0; i < 120; i++) {
          notes.push({ lane: i % 4, time: t, hit: false });
          t += 0.4;
        }
        total = notes.length;
        songDuration = t;

        startTime = performance.now() / 1000;
        gameStarted = true;
        loop();
      }

      // DRAW
      function draw() {
        ctx.clearRect(0, 0, c.width, c.height);

        // receptors
        for (let i = 0; i < 4; i++) {
          ctx.fillStyle = "rgba(0,255,255,0.25)";
          ctx.fillRect(i * laneW + 10, c.height - 140, laneW - 20, 60);
          ctx.strokeStyle = "#0ff";
          ctx.strokeRect(i * laneW + 10, c.height - 140, laneW - 20, 60);
        }

        // notes
        if (gameStarted) {
          let time = performance.now() / 1000 - startTime;
          notes.forEach((n) => {
            if (n.hit) return;
            let y = c.height - 140 - (n.time - time) * SPEED;
            if (y < -50 || y > c.height) return;

            ctx.shadowColor = "#0ff";
            ctx.shadowBlur = 15;
            ctx.fillStyle = `hsl(${n.lane * 90},100%,60%)`;
            ctx.fillRect(n.lane * laneW + 20, y, laneW - 40, 50);
            ctx.shadowBlur = 0;
          });
        }
      }

      // UPDATE
      function update() {
        let time = performance.now() / 1000 - startTime;

        // misses
        notes.forEach((n) => {
          if (!n.hit && time - n.time > 0.3) {
            n.hit = true;
            combo = 0;
          }
        });

        // END SCREEN
        if (time > songDuration + 1) {
          showEnd();
        }

        updateRank();
      }

      // HIT
      function hit(l) {
        let time = performance.now() / 1000 - startTime;
        let best = null,
          bd = 999;

        notes.forEach((n) => {
          if (n.hit || n.lane !== l) return;
          let d = Math.abs(n.time - time);
          if (d < bd) {
            bd = d;
            best = n;
          }
        });

        if (!best) {
          combo = 0;
          return;
        }

        if (bd < 0.08) {
          score += 300;
          hits++;
        } else if (bd < 0.14) {
          score += 200;
          hits++;
        } else if (bd < 0.22) {
          score += 100;
          hits++;
        } else if (bd < 0.3) {
          score += 50;
          hits++;
        } else {
          combo = 0;
          return;
        }

        best.hit = true;
        combo++;

        scoreEl.innerText = score;
        comboEl.innerText = combo;
      }

      // RANK
      function updateRank() {
        let acc = hits / Math.max(1, total);
        accEl.innerText = Math.round(acc * 100) + "%";

        let r = "D";
        if (acc > 0.95) r = "S";
        else if (acc > 0.85) r = "A";
        else if (acc > 0.7) r = "B";
        else if (acc > 0.5) r = "C";

        rankEl.innerText = r;
      }

      // END SCREEN
      function showEnd() {
        gameStarted = false;

        let acc = hits / Math.max(1, total);
        let rank = rankEl.innerText;

        document.getElementById("finalScore").innerText = "Score: " + score;
        document.getElementById("finalAcc").innerText =
          "Accuracy: " + Math.round(acc * 100) + "%";
        document.getElementById("finalRank").innerText = "Rank: " + rank;

        endScreen.style.opacity = 1;
        endScreen.style.pointerEvents = "auto";
      }

      // LOOP
      function loop() {
        draw();
        if (gameStarted) update();
        requestAnimationFrame(loop);
      }

      // CONTROLS
      const keys = {
        A: 0,
        W: 1,
        S: 2,
        D: 3,
        Q: 0,
        W: 1,
        E: 2,
        R: 3,
        U: 0,
        I: 1,
        O: 2,
        P: 3,
      };
      addEventListener("keydown", (e) => {
        let l = keys[e.key.toUpperCase()];
        if (l != null) hit(l);
      });

      document.querySelectorAll(".touchBtn").forEach((b) => {
        b.addEventListener(
          "touchstart",
          (e) => {
            e.preventDefault();
            hit(parseInt(b.dataset.lane));
          },
          { passive: false },
        );
      });
    </script>
  </body>
</html>
