<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>ONLINE Rhythm Game</title>
    <style>
      body {
        margin: 0;
        background: black;
        overflow: hidden;
        font-family: Arial;
        color: white;
      }
      canvas {
        display: block;
      }
      #menu {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
      }
      button {
        padding: 12px 20px;
        margin: 6px;
        font-size: 16px;
      }
      #ui {
        position: absolute;
        top: 10px;
        left: 10px;
      }
      #combo {
        font-size: 24px;
        color: #0ff;
      }
      .touchBtn {
        position: absolute;
        bottom: 0;
        width: 25%;
        height: 30vh;
        background: rgba(0, 255, 255, 0.15);
        border: 1px solid #0ff;
      }
    </style>
  </head>
  <body>
    <div id="menu">
      <h2>ONLINE MODE</h2>
      <button id="fileBtn">📁 Upload Song</button><br />
      <input
        id="urlInput"
        placeholder="Paste direct audio link (.mp3/.wav/.m4a)"
        style="width: 260px; padding: 8px"
      /><br />
      <button onclick="loadURL()">🌐 Load URL</button>
    </div>

    <div id="ui">
      Score: <span id="score">0</span><br />
      <div id="combo">Combo: 0</div>
    </div>

    <div class="touchBtn" style="left: 0" data-lane="0"></div>
    <div class="touchBtn" style="left: 25%" data-lane="1"></div>
    <div class="touchBtn" style="left: 50%" data-lane="2"></div>
    <div class="touchBtn" style="left: 75%" data-lane="3"></div>

    <canvas id="c"></canvas>
    <audio id="music" playsinline crossorigin="anonymous"></audio>

    <script>
      const c = document.getElementById("c"),
        ctx = c.getContext("2d");
      c.width = innerWidth;
      c.height = innerHeight;
      const music = document.getElementById("music");
      const menu = document.getElementById("menu");

      let audioCtx;
      let notes = [],
        score = 0,
        combo = 0;
      const laneW = c.width / 4;

      // Dual keyboard mappings: WASD, QWER, UIOP
      const keyToLane = {
        // QWER
        Q: 0,
        W: 1,
        E: 2,
        R: 3,
        // UIOP
        U: 0,
        I: 1,
        O: 2,
        P: 3,
      };

      async function unlock() {
        if (!audioCtx)
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === "suspended") await audioCtx.resume();
      }

      async function analyze(buffer) {
        const audio = await audioCtx.decodeAudioData(buffer.slice(0));
        const data = audio.getChannelData(0);
        const sr = audio.sampleRate;
        let beats = [],
          size = 2048;
        for (let i = 0; i < data.length; i += size) {
          let sum = 0;
          for (let j = 0; j < size; j++) {
            let v = data[i + j] || 0;
            sum += v * v;
          }
          if (Math.sqrt(sum / size) > 0.25) beats.push(i / sr);
        }
        let out = [],
          last = 0;
        beats.forEach((t) => {
          if (t - last > 0.2) {
            out.push(t);
            last = t;
          }
        });
        return out;
      }

      function spawn(b) {
        notes = b.map((t) => ({
          lane: Math.floor(Math.random() * 4),
          time: t,
          hit: false,
        }));
      }

      function draw() {
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.fillRect(0, 0, c.width, c.height);
        for (let i = 0; i < 4; i++) {
          ctx.fillStyle = "rgba(80,80,150,0.3)";
          ctx.fillRect(i * laneW, 0, laneW, c.height);
        }
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, c.height - 120, c.width, 5);
        notes.forEach((n) => {
          if (n.hit) return;
          let y = c.height - 120 - (n.time - music.currentTime) * 500;
          ctx.fillStyle = `hsl(${n.lane * 90},100%,60%)`;
          ctx.fillRect(n.lane * laneW + 20, y, laneW - 40, 20);
        });
      }

      function update() {
        notes.forEach((n) => {
          if (
            !n.hit &&
            c.height - 120 - (n.time - music.currentTime) * 500 > c.height
          ) {
            n.hit = true;
            combo = 0;
          }
        });
      }

      function hit(l) {
        let best = null,
          bd = 999;
        notes.forEach((n) => {
          if (n.hit || n.lane !== l) return;
          let d = Math.abs(n.time - music.currentTime);
          if (d < bd) {
            bd = d;
            best = n;
          }
        });
        if (!best) return;
        if (bd < 0.12) {
          combo++;
          score += 100 * combo;
          best.hit = true;
        } else combo = 0;
        document.getElementById("score").innerText = score;
        document.getElementById("combo").innerText = "Combo: " + combo;
      }

      function loop() {
        draw();
        update();
        requestAnimationFrame(loop);
      }

      // Keyboard controls using all three mappings
      addEventListener("keydown", (e) => {
        const l = keyToLane[e.key.toUpperCase()];
        if (l !== undefined) hit(l);
      });

      // touch
      document.querySelectorAll(".touchBtn").forEach((btn) => {
        btn.addEventListener(
          "touchstart",
          () => hit(parseInt(btn.dataset.lane)),
          { passive: true },
        );
      });

      // FILE LOAD
      document.getElementById("fileBtn").onclick = async () => {
        await unlock();
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "audio/*,.mp3,.wav,.m4a";
        input.onchange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const buf = await file.arrayBuffer();
          start(buf, URL.createObjectURL(file));
        };
        input.click();
      };

      // URL LOAD
      async function loadURL() {
        try {
          await unlock();
          const url = document.getElementById("urlInput").value.trim();
          if (!url) return alert("Paste a valid audio URL");

          const res = await fetch(url, { mode: "cors" });
          if (!res.ok) throw new Error("Fetch failed");

          const buf = await res.arrayBuffer();
          start(buf, url);
        } catch (err) {
          alert("URL failed. Use direct .mp3/.wav link or upload file.");
        }
      }

      async function start(buffer, src) {
        menu.style.display = "none";
        const beats = await analyze(buffer);
        spawn(beats);
        music.src = src;
        await music.play().catch(() => {});
        loop();
      }
    </script>
  </body>
</html>
