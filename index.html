<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AAA Rhythm Game</title>

    <style>
      body {
        margin: 0;
        background: #000;
        color: white;
        font-family: Arial;
        overflow: hidden;
      }

      #menu {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 5;
      }

      button {
        padding: 12px 20px;
        margin: 6px;
        font-size: 16px;
        border-radius: 10px;
        border: none;
      }

      #hud {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 30px;
        background: rgba(0, 0, 0, 0.5);
        padding: 15px 25px;
        border-radius: 20px;
        z-index: 3;
      }

      #combo {
        font-size: 40px;
        color: #0ff;
      }
      #rank {
        font-size: 30px;
        color: #ff0;
      }

      .touchBtn {
        position: absolute;
        bottom: 0;
        width: 25%;
        height: 35vh;
        background: rgba(0, 255, 255, 0.15);
        z-index: 2;
      }

      #bgVideo {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -2;
        filter: brightness(0.3);
        pointer-events: none;
        display: none;
      }

      #videoBtn {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 6;
      }
    </style>
  </head>

  <body>
    <div id="menu">
      <h2>AAA MODE</h2>
      <button id="demoBtn">▶ Play Original Song</button>
    </div>

    <button id="videoBtn">🎥 Load Video</button>

    <video id="bgVideo" autoplay loop muted playsinline></video>

    <div id="hud">
      <div>Score <span id="score">0</span></div>
      <div id="combo">0</div>
      <div>Rank <span id="rank">D</span></div>
      <div>Acc <span id="acc">100%</span></div>
    </div>

    <div class="touchBtn" style="left: 0" data-lane="0"></div>
    <div class="touchBtn" style="left: 25%" data-lane="1"></div>
    <div class="touchBtn" style="left: 50%" data-lane="2"></div>
    <div class="touchBtn" style="left: 75%" data-lane="3"></div>

    <canvas id="c"></canvas>

    <script>
      const c = document.getElementById("c"),
        ctx = c.getContext("2d");
      c.width = innerWidth;
      c.height = innerHeight;

      const bgVideo = document.getElementById("bgVideo");

      let notes = [],
        score = 0,
        combo = 0,
        hits = 0,
        total = 0;
      let startTime = 0,
        gameStarted = false;

      const laneW = innerWidth / 4;
      const SPEED = 500;

      const scoreEl = document.getElementById("score");
      const comboEl = document.getElementById("combo");
      const rankEl = document.getElementById("rank");
      const accEl = document.getElementById("acc");

      // 🎥 VIDEO UPLOAD
      document.getElementById("videoBtn").onclick = () => {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "video/*";

        input.onchange = (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const url = URL.createObjectURL(file);
          bgVideo.src = url;
          bgVideo.style.display = "block";
          bgVideo.play();
        };

        input.click();
      };

      // 🎵 START SONG
      document.getElementById("demoBtn").onclick = async () => {
        await startFullSong();
      };

      async function startFullSong() {
        const ctxAudio = new (
          window.AudioContext || window.webkitAudioContext
        )();
        const master = ctxAudio.createGain();
        master.gain.value = 0.5;
        master.connect(ctxAudio.destination);

        notes = [];
        score = 0;
        combo = 0;
        hits = 0;

        const BPM = 140;
        const beat = 60 / BPM;
        const startDelay = 1;

        let t = startDelay;

        function play(freq, time, len, type = "square", vol = 0.2) {
          let o = ctxAudio.createOscillator();
          let g = ctxAudio.createGain();
          o.type = type;
          o.frequency.value = freq;

          g.gain.setValueAtTime(0, time);
          g.gain.linearRampToValueAtTime(vol, time + 0.01);
          g.gain.linearRampToValueAtTime(0, time + len);

          o.connect(g);
          g.connect(master);
          o.start(time);
          o.stop(time + len);
        }

        function spawn(lane, time) {
          notes.push({ lane: lane, time: time - startDelay, hit: false });
        }

        // INTRO
        for (let i = 0; i < 16; i++) {
          let lane = i % 4;
          play(220 + lane * 60, t, beat);
          spawn(lane, t);
          t += beat;
        }

        // BUILD
        for (let i = 0; i < 16; i++) {
          let lane = Math.floor(Math.random() * 4);
          play(300 + lane * 80, t, beat * 0.8);
          spawn(lane, t);
          t += beat * 0.75;
        }

        // DROP
        for (let i = 0; i < 48; i++) {
          let lane = i % 4;

          play(400 + lane * 120, t, beat * 0.5, "sawtooth", 0.25);
          play(100, t, beat * 0.5, "square", 0.3);
          play(60, t, 0.1, "sine", 0.4);
          if (i % 2 === 0) play(180, t, 0.05, "triangle", 0.2);

          spawn(lane, t);
          t += beat * 0.5;
        }

        // OUTRO
        for (let i = 0; i < 16; i++) {
          let lane = Math.floor(Math.random() * 4);
          play(200 + lane * 50, t, beat);
          spawn(lane, t);
          t += beat;
        }

        total = notes.length;

        document.getElementById("menu").style.display = "none";
        startTime = performance.now() / 1000;
        gameStarted = true;

        loop();
      }

      // DRAW
      function draw() {
        // 🌌 reactive background if no video
        if (bgVideo.style.display !== "block") {
          let time = performance.now() * 0.002;

          let grad = ctx.createLinearGradient(0, 0, 0, innerHeight);
          grad.addColorStop(0, `hsl(${(time * 40) % 360},70%,10%)`);
          grad.addColorStop(1, `hsl(${(time * 40 + 60) % 360},70%,5%)`);

          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, innerWidth, innerHeight);

          ctx.beginPath();
          for (let x = 0; x < innerWidth; x += 10) {
            let y = Math.sin(x * 0.01 + time * 4) * 20 + innerHeight / 2;
            ctx.lineTo(x, y);
          }
          ctx.strokeStyle = "rgba(0,255,255,0.2)";
          ctx.lineWidth = 3;
          ctx.stroke();
        } else {
          ctx.clearRect(0, 0, innerWidth, innerHeight);
        }

        // lanes
        for (let i = 0; i < 4; i++) {
          ctx.fillStyle = "rgba(80,80,150,0.3)";
          ctx.fillRect(i * laneW, 0, laneW, innerHeight);
        }

        // hit line
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, innerHeight - 120, innerWidth, 5);

        // notes
        if (gameStarted) {
          let time = performance.now() / 1000 - startTime;
          notes.forEach((n) => {
            if (n.hit) return;
            let y = innerHeight - 120 - (n.time - time) * SPEED;
            if (y < -50 || y > innerHeight) return;

            ctx.fillStyle = `hsl(${n.lane * 90},100%,60%)`;
            ctx.fillRect(n.lane * laneW + 20, y, laneW - 40, 50);
          });
        }
      }

      // UPDATE
      function update() {
        let time = performance.now() / 1000 - startTime;

        notes.forEach((n) => {
          if (!n.hit && time - n.time > 0.3) {
            n.hit = true;
            combo = 0;
          }
        });

        updateRank();
      }

      // HIT
      function hit(l) {
        let time = performance.now() / 1000 - startTime;

        let best = null,
          bd = 999;
        notes.forEach((n) => {
          if (n.hit || n.lane !== l) return;
          let d = Math.abs(n.time - time);
          if (d < bd) {
            bd = d;
            best = n;
          }
        });

        if (!best) {
          combo = 0;
          return;
        }

        if (bd < 0.08) {
          score += 300;
          hits++;
        } else if (bd < 0.14) {
          score += 200;
          hits++;
        } else if (bd < 0.22) {
          score += 100;
          hits++;
        } else if (bd < 0.3) {
          score += 50;
          hits++;
        } else {
          combo = 0;
          return;
        }

        best.hit = true;
        combo++;

        scoreEl.innerText = score;
        comboEl.innerText = combo;
      }

      // RANK
      function updateRank() {
        let acc = hits / Math.max(1, total);
        accEl.innerText = Math.round(acc * 100) + "%";

        let r = "D";
        if (acc > 0.95) r = "S";
        else if (acc > 0.85) r = "A";
        else if (acc > 0.7) r = "B";
        else if (acc > 0.5) r = "C";

        rankEl.innerText = r;
      }

      // LOOP
      function loop() {
        draw();
        if (gameStarted) update();
        requestAnimationFrame(loop);
      }

      // CONTROLS
      const keys = {
        A: 0,
        W: 1,
        S: 2,
        D: 3,
        Q: 0,
        W: 1,
        E: 2,
        R: 3,
        U: 0,
        I: 1,
        O: 2,
        P: 3,
      };
      addEventListener("keydown", (e) => {
        let l = keys[e.key.toUpperCase()];
        if (l != null) hit(l);
      });

      document.querySelectorAll(".touchBtn").forEach((b) => {
        b.addEventListener(
          "touchstart",
          (e) => {
            e.preventDefault();
            hit(parseInt(b.dataset.lane));
          },
          { passive: false },
        );
      });
    </script>
  </body>
</html>
